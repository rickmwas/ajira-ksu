<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ajira Club Logo Mark">
  <defs>
    <!-- Mask to create clean transparent gaps around nodes and connection lines -->
    <mask id="ajira-logo-mask">
      <!-- Everything white remains visible -->
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <!-- Everything black is subtracted (creating gaps) -->
      <circle cx="20" cy="50" r="11" fill="black" />
      <circle cx="50" cy="20" r="11" fill="black" />
      <circle cx="80" cy="50" r="11" fill="black" />
      <circle cx="50" cy="80" r="11" fill="black" />
      <circle cx="50" cy="50" r="8.5" fill="black" />
    </mask>
  </defs>

  <!-- Connection lines with transparent gaps -->
  <g mask="url(#ajira-logo-mask)">
    <!-- Top-Left connection (Blue) -->
    <line x1="20" y1="50" x2="50" y2="20" stroke="#0056A6" stroke-width="4.5" stroke-linecap="round" />
    <!-- Top-Right connection (Yellow) -->
    <line x1="50" y1="20" x2="80" y2="50" stroke="#F4B400" stroke-width="4.5" stroke-linecap="round" />
    <!-- Bottom-Right connection (Red) -->
    <line x1="80" y1="50" x2="50" y2="80" stroke="#D62828" stroke-width="4.5" stroke-linecap="round" />
    <!-- Bottom-Left connection (Green) -->
    <line x1="50" y1="80" x2="20" y2="50" stroke="#16A34A" stroke-width="4.5" stroke-linecap="round" />
    <!-- Inner Right-to-Center connection (Yellow) -->
    <line x1="80" y1="50" x2="50" y2="50" stroke="#F4B400" stroke-width="4.5" stroke-linecap="round" />
  </g>

  <!-- Outer nodes -->
  <circle cx="20" cy="50" r="7.5" fill="#0056A6" />
  <circle cx="50" cy="20" r="7.5" fill="#0056A6" />
  <circle cx="80" cy="50" r="7.5" fill="#F4B400" />
  <circle cx="50" cy="80" r="7.5" fill="#D62828" />

  <!-- Center node -->
  <circle cx="50" cy="50" r="5" fill="#F4B400" />

  <!-- Node inner white circles (rings) -->
  <circle cx="20" cy="50" r="2.5" fill="white" />
  <circle cx="50" cy="20" r="2.5" fill="white" />
  <circle cx="80" cy="50" r="2.5" fill="white" />
  <circle cx="50" cy="80" r="2.5" fill="white" />
</svg>
