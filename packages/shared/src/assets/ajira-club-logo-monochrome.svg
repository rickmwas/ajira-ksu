<svg viewBox="0 0 540 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ajira Club Kisii University Monochrome Logo">
  <defs>
    <!-- Google Fonts import for consistent brand typography across devices -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@700;800&amp;display=swap');
      .logo-text-title {
        font-family: 'Sora', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        font-size: 38px;
        fill: currentColor;
      }
      .logo-text-subtitle {
        font-family: 'Sora', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 700;
        font-size: 17px;
        fill: currentColor;
        letter-spacing: 0.32em;
      }
    </style>

    <!-- Mask to create clean transparent gaps around nodes and connection lines -->
    <mask id="ajira-logo-mask-mono">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <circle cx="20" cy="50" r="11" fill="black" />
      <circle cx="50" cy="20" r="11" fill="black" />
      <circle cx="80" cy="50" r="11" fill="black" />
      <circle cx="50" cy="80" r="11" fill="black" />
      <circle cx="50" cy="50" r="8.5" fill="black" />
    </mask>

    <!-- Mask to punch transparent holes in the center of the nodes -->
    <mask id="ajira-node-hole-mask-mono">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <circle cx="20" cy="50" r="2.5" fill="black" />
      <circle cx="50" cy="20" r="2.5" fill="black" />
      <circle cx="80" cy="50" r="2.5" fill="black" />
      <circle cx="50" cy="80" r="2.5" fill="black" />
    </mask>
  </defs>

  <!-- Logo Mark (inherits currentColor) -->
  <g transform="translate(10, 0)">
    <!-- Connection lines with transparent gaps -->
    <g mask="url(#ajira-logo-mask-mono)">
      <line x1="20" y1="50" x2="50" y2="20" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" />
      <line x1="50" y1="20" x2="80" y2="50" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" />
      <line x1="80" y1="50" x2="50" y2="80" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" />
      <line x1="50" y1="80" x2="20" y2="50" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" />
      <line x1="80" y1="50" x2="50" y2="50" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" />
    </g>

    <!-- Outer nodes and center node (with inner holes punched via mask) -->
    <g mask="url(#ajira-node-hole-mask-mono)">
      <circle cx="20" cy="50" r="7.5" fill="currentColor" />
      <circle cx="50" cy="20" r="7.5" fill="currentColor" />
      <circle cx="80" cy="50" r="7.5" fill="currentColor" />
      <circle cx="50" cy="80" r="7.5" fill="currentColor" />
      <circle cx="50" cy="50" r="5" fill="currentColor" />
    </g>
  </g>

  <!-- Typography Lockup -->
  <!-- "AJIRA CLUB" Title -->
  <text class="logo-text-title" x="125" y="48">AJIRA CLUB</text>
  
  <!-- Short Separator Line -->
  <line x1="230" y1="62" x2="270" y2="62" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
  
  <!-- "KISII UNIVERSITY" Subtitle -->
  <text class="logo-text-subtitle" x="126" y="85">KISII UNIVERSITY</text>
</svg>
