<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ajira Club Social Icon">
  <defs>
    <!-- Google Fonts import for consistent brand typography across devices -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@800&amp;display=swap');
      .app-icon-text {
        font-family: 'Sora', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        font-size: 210px;
        fill: #FFFFFF;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Dark Navy rounded background -->
  <rect width="512" height="512" rx="112" fill="#0F172A" />

  <!-- "AK" text -->
  <text class="app-icon-text" x="256" y="295">AK</text>

  <!-- Gold separator line -->
  <line x1="180" y1="350" x2="332" y2="350" stroke="#F4B400" stroke-width="20" stroke-linecap="round" />
</svg>
