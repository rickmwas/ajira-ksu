<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ajira Club Favicon">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@800&amp;display=swap');
      .fav-text {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 26px;
        fill: #FFFFFF;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Dark Navy rounded background -->
  <rect width="64" height="64" rx="14" fill="#0F172A" />

  <!-- "AK" text -->
  <text class="fav-text" x="32" y="37">AK</text>

  <!-- Gold separator line -->
  <line x1="22" y1="44" x2="42" y2="44" stroke="#F4B400" stroke-width="3.5" stroke-linecap="round" />
</svg>
