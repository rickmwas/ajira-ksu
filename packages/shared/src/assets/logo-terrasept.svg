<svg viewBox="0 0 260 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TerraSept Solutions">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800&amp;display=swap');
      .ts-name { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 800; font-size: 20px; fill: #0f172a; letter-spacing: 0.5px; }
      .ts-sub { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 500; font-size: 8px; fill: #64748b; letter-spacing: 2px; }
    </style>
    <linearGradient id="ts-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <!-- T-shaped icon mark (stylised from their brand mark) -->
  <g transform="translate(6, 8)">
    <!-- Rounded square background -->
    <rect width="52" height="52" rx="12" fill="#0f172a"/>
    <!-- T letterform in orange -->
    <rect x="10" y="12" width="32" height="8" rx="3" fill="url(#ts-grad)"/>
    <rect x="21" y="20" width="10" height="22" rx="3" fill="url(#ts-grad)"/>
  </g>
  <!-- Wordmark -->
  <text class="ts-name" x="70" y="34">TERRASEPT</text>
  <text class="ts-sub" x="71" y="50">SOLUTIONS</text>
</svg>
